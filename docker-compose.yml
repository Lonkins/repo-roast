# repo-roast self-host. Zero-cost: one container, no database.
#   cp .env.example .env   # then fill in what you want (all optional)
#   docker compose up --build
services:
  repo-roast:
    build:
      context: .
      args:
        GITLEAKS_VERSION: "8.30.1"
    ports:
      - "3000:3000"
    environment:
      # Public mode works with none of these set. Uncomment what you need.
      # Raises GitHub API limits for public scans (no scopes needed):
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      # Private mode (register your own OAuth App — see docs/self-host.md):
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      AUTH_SECRET: ${AUTH_SECRET:-}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      # Optional comedy LLM (defaults to the bundled template roaster):
      ROAST_PROVIDER: ${ROAST_PROVIDER:-template}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    restart: unless-stopped
